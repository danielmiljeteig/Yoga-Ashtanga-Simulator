<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>YOGA Ashtanga Simulator – Sequence 1</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a2a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
  canvas { image-rendering: auto; }

<body>
<script>
// =============================================================================
// YOGA ASHTANGA SIMULATOR – SEQUENCE 1 (Surya Namaskar A)
// =============================================================================
//
// NEW MECHANIC:
// Each pose has a KEY COMBO (subset of Q/W/E/A/D). Hold the right keys.
// SPACE = inhale. Hold Space for in-breaths, release for out-breaths.
// A pulsing BREATH CIRCLE shows your breathing — grows on inhale, shrinks on exhale.
// Hold correct combo + correct breath = body flows into pose, score increases.
//
// =============================================================================

const FNT = '"Segoe UI",Roboto,Helvetica,Arial,sans-serif';
const W = 960, H = 660, GND = 520;

// ---- BODY ----
const B = { spine:105, neck:30, uArm:72, lArm:66, shW:24, uLeg:82, lLeg:74, hipW:13 };
const LW = { torso:30, neck:18, uArm:15, lArm:13, uLeg:19, lLeg:16 };

// ---- POSE TARGETS ----
const P = {
  sama:   { hip:{x:460,y:GND-155}, handL:{x:435,y:GND-30}, handR:{x:485,y:GND-30}, footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:-Math.PI/2 },
  urdhva: { hip:{x:460,y:GND-155}, handL:{x:457,y:GND-295}, handR:{x:463,y:GND-295}, footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:-Math.PI/2-.12 },
  uttana: { hip:{x:460,y:GND-150}, handL:{x:440,y:GND-5}, handR:{x:470,y:GND-5}, footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:0.9 },
  ardha:  { hip:{x:490,y:GND-145}, handL:{x:405,y:GND-5}, handR:{x:435,y:GND-5}, footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:-0.1 },
  chatur: { hip:{x:470,y:GND-50}, handL:{x:345,y:GND-5}, handR:{x:370,y:GND-5}, footL:{x:595,y:GND-5}, footR:{x:620,y:GND-5}, spa:0.05 },
  updog:  { hip:{x:500,y:GND-45}, handL:{x:350,y:GND-5}, handR:{x:375,y:GND-5}, footL:{x:610,y:GND-5}, footR:{x:635,y:GND-5}, spa:-0.35 },
  ddog:   { hip:{x:470,y:GND-215}, handL:{x:280,y:GND-3}, handR:{x:305,y:GND-3}, footL:{x:610,y:GND-2}, footR:{x:635,y:GND-2}, spa:2.2 },
};

// ---- SEQUENCE ----
// keys: which keys must be held for this pose (Q=handL, W=hip, E=handR, A=footL, D=footR)
// breath: 'in' = must hold SPACE, 'out' = must release SPACE
const SEQ = [
  { name:'Samasthiti',    sans:'Samasthiti',             count:null,      breath:null, type:'start', tgt:P.sama,   keys:[] },
  { name:'Arms Up',       sans:'Urdhva Hastasana',       count:'Ekam',    breath:'in', type:'flow',  tgt:P.urdhva, keys:['Q','W','E'] },
  { name:'Forward Fold',  sans:'Uttanasana',             count:'Dve',     breath:'out',type:'flow',  tgt:P.uttana, keys:['Q','E'] },
  { name:'Half Lift',     sans:'Ardha Uttanasana',       count:'Trini',   breath:'in', type:'flow',  tgt:P.ardha,  keys:['Q','W','E'] },
  { name:'Low Plank',     sans:'Chaturanga Dandasana',   count:'Chatvari',breath:'out',type:'flow',  tgt:P.chatur, keys:['Q','E','A','D'] },
  { name:'Upward Dog',    sans:'Urdhva Mukha Svanasana', count:'Panca',   breath:'in', type:'flow',  tgt:P.updog,  keys:['Q','W','E'] },
  { name:'Downward Dog',  sans:'Adho Mukha Svanasana',   count:'Ṣaṭ',   breath:'out',type:'hold',  tgt:P.ddog,   keys:['Q','E','A','D'], breaths:5 },
  { name:'Half Lift',     sans:'Ardha Uttanasana',       count:'Sapta',   breath:'in', type:'flow',  tgt:P.ardha,  keys:['Q','W','E'] },
  { name:'Forward Fold',  sans:'Uttanasana',             count:'Aṣṭau', breath:'out',type:'flow',  tgt:P.uttana, keys:['Q','E'] },
  { name:'Arms Up',       sans:'Urdhva Hastasana',       count:'Nava',    breath:'in', type:'flow',  tgt:P.urdhva, keys:['Q','W','E'] },
  { name:'Samasthiti',    sans:'Samasthiti',             count:null,      breath:'out',type:'end',   tgt:P.sama,   keys:[] },
];

// ---- IK ----
function ik(r,t,lA,lB,bd){const dx=t.x-r.x,dy=t.y-r.y,d=Math.sqrt(dx*dx+dy*dy)||.01;if(d>=lA+lB-1){const f=lA/(lA+lB);return{x:r.x+dx*f,y:r.y+dy*f};}const ed=Math.max(d,Math.abs(lA-lB)+1),ca=Phaser.Math.Clamp((lA*lA+ed*ed-lB*lB)/(2*lA*ed),-1,1),aa=Math.acos(ca),ba=Math.atan2(dy,dx),ja=ba+aa*bd,rx=r.x+Math.cos(ja)*lA,ry=r.y+Math.sin(ja)*lA;return isNaN(rx)?{x:(r.x+t.x)/2,y:(r.y+t.y)/2}:{x:rx,y:ry};}

function skel(cp,spa){
  const s={};s.hip={x:cp.hip.x,y:cp.hip.y};spa=isNaN(spa)?-Math.PI/2:spa;
  s.chest={x:s.hip.x+Math.cos(spa)*B.spine,y:s.hip.y+Math.sin(spa)*B.spine};
  s.neck={x:s.chest.x+Math.cos(spa)*B.neck*.55,y:s.chest.y+Math.sin(spa)*B.neck*.55};
  s.head={x:s.chest.x+Math.cos(spa)*B.neck,y:s.chest.y+Math.sin(spa)*B.neck};
  const pa=spa+Math.PI/2;
  s.shL={x:s.chest.x-Math.cos(pa)*B.shW,y:s.chest.y-Math.sin(pa)*B.shW};
  s.shR={x:s.chest.x+Math.cos(pa)*B.shW,y:s.chest.y+Math.sin(pa)*B.shW};
  s.elbL=ik(s.shL,cp.handL,B.uArm,B.lArm,cp.handL.y<s.shL.y?1:-1);
  s.elbR=ik(s.shR,cp.handR,B.uArm,B.lArm,cp.handR.y<s.shR.y?-1:1);
  s.handL={x:cp.handL.x,y:cp.handL.y};s.handR={x:cp.handR.x,y:cp.handR.y};
  s.hipL={x:s.hip.x-B.hipW,y:s.hip.y};s.hipR={x:s.hip.x+B.hipW,y:s.hip.y};
  s.knL=ik(s.hipL,cp.footL,B.uLeg,B.lLeg,cp.footL.x<s.hip.x?1:-1);
  s.knR=ik(s.hipR,cp.footR,B.uLeg,B.lLeg,cp.footR.x<s.hip.x?1:-1);
  s.footL={x:cp.footL.x,y:cp.footL.y};s.footR={x:cp.footR.x,y:cp.footR.y};
  return s;
}
const BONES=[{a:'hip',b:'chest',w:LW.torso},{a:'chest',b:'neck',w:LW.neck},{a:'shL',b:'elbL',w:LW.uArm},{a:'elbL',b:'handL',w:LW.lArm},{a:'shR',b:'elbR',w:LW.uArm},{a:'elbR',b:'handR',w:LW.lArm},{a:'hipL',b:'knL',w:LW.uLeg},{a:'knL',b:'footL',w:LW.lLeg},{a:'hipR',b:'knR',w:LW.uLeg},{a:'knR',b:'footR',w:LW.lLeg}];

// ---- AUDIO ----
let actx=null;function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,d,v){const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v||.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}
function sfxSnap(){beep(660,.1,.06);setTimeout(()=>beep(880,.08,.04),60);}
function sfxBreath(){beep(440,.2,.04);}
function sfxWin(){beep(523,.2,.1);setTimeout(()=>beep(659,.2,.1),150);setTimeout(()=>beep(784,.3,.1),300);}
function sfxFail(){beep(220,.3,.1);setTimeout(()=>beep(180,.4,.1),200);}
function sfxCount(n){beep(330+n*40,.15,.05);}

// ---- MUSIC ----
let mP=false,mN=[];
function mStart(){if(mP)return;mP=true;const c=ac(),m=c.createGain();m.gain.value=0;m.connect(c.destination);m.gain.linearRampToValueAtTime(.1,c.currentTime+3);
[130.81,196,261.63].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain(),l=c.createOscillator(),lg=c.createGain();o.type='sine';o.frequency.value=f;l.type='sine';l.frequency.value=.15+i*.08;lg.gain.value=f*.003;l.connect(lg);lg.connect(o.frequency);g.gain.value=i===0?.4:i===1?.25:.2;o.connect(g);g.connect(m);o.start();l.start();mN.push(o,l,g,lg);});
function bowl(){if(!mP)return;const c2=ac(),f=[261.63,293.66,329.63,392,440,523.25][Math.floor(Math.random()*6)],o=c2.createOscillator(),g=c2.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.05,c2.currentTime);g.gain.exponentialRampToValueAtTime(.001,c2.currentTime+4);o.connect(g);g.connect(m);o.start();o.stop(c2.currentTime+4);setTimeout(bowl,3000+Math.random()*6000);}
setTimeout(bowl,2000);mN.push(m);}
function mStop(){if(!mP)return;mP=false;const c=ac();mN.forEach(n=>{try{if(n.gain)n.gain.linearRampToValueAtTime(0,c.currentTime+1);}catch(e){}try{n.stop&&n.stop(c.currentTime+1.5);}catch(e){}});mN=[];}

// ---- STATES ----
const ST={INTRO:0,FLOW:1,HOLD:2,COMPLETE:3,FAIL:4};

// ===========================================================================
class Game extends Phaser.Scene {
  constructor(){super('Game');}

  create(){
    this.vi=0; this.st=ST.INTRO; this.score=0; this.streak=0;
    // Current body position (lerps toward targets)
    this.cur={};for(const k of['hip','handL','handR','footL','footR'])this.cur[k]={x:P.sama[k].x,y:P.sama[k].y};
    this.curSpa=P.sama.spa; this.tgtSpa=P.sama.spa;
    // Ghost target (tweened separately)
    this.ghost={};for(const k of['hip','handL','handR','footL','footR'])this.ghost[k]={x:P.sama[k].x,y:P.sama[k].y};
    this.ghostSpa=P.sama.spa;
    // Keys held
    this.keys={Q:false,W:false,E:false,A:false,D:false,SPACE:false};
    // Breath state: 0=empty, 1=full. Grows when Space held, shrinks when released.
    this.breath=0;
    // Hold state (for DD)
    this.holdBreaths=0; this.holdTimer=0; this.strain=0;
    // Pose match progress (0→1 for smooth transition)
    this.poseBlend=0;
    // Score popup queue
    this.lastScoreTime=0;

    this.sk=skel(this.cur,this.curSpa);

    this.gBg=this.add.graphics().setDepth(0);
    this.gMentor=this.add.graphics().setDepth(1);
    this.gGhost=this.add.graphics().setDepth(2);
    this.gBody=this.add.graphics().setDepth(5);
    this.gBreath=this.add.graphics().setDepth(7);
    this.gUI=this.add.graphics().setDepth(8);

    this.makeTex();this.drawBg();this.drawMentor();this.buildUI();this.bindKeys();

    this.mStarted=false;
  }

  shutdown(){/* clean */}

  makeTex(){
    if(!this.textures.exists('pt')){
      let g=this.add.graphics();g.fillStyle(0xffffff);g.fillCircle(3,3,3);g.generateTexture('pt',6,6);g.destroy();
      g=this.add.graphics();g.fillStyle(0xfff8e0);g.fillCircle(2,2,2);g.generateTexture('dust',4,4);g.destroy();
      [0xff6b6b,0xffd93d,0x6bcb77,0x4d96ff,0xff8c32,0xc77dff].forEach((c,i)=>{const cg=this.add.graphics();cg.fillStyle(c);cg.fillRect(0,0,8,5);cg.generateTexture(`cf${i}`,8,5);cg.destroy();});
    }
    this.breathE=this.add.particles(0,0,'pt',{speed:{min:8,max:20},angle:{min:240,max:300},scale:{start:.6,end:0},lifespan:500,tint:0xffffff,alpha:{start:.5,end:0},frequency:-1,quantity:3}).setDepth(10);
    this.add.particles(0,0,'dust',{x:{min:0,max:W},y:{min:0,max:GND-30},speedX:{min:-3,max:3},speedY:{min:-5,max:-1},scale:{min:.3,max:1},alpha:{min:.08,max:.2},lifespan:{min:6000,max:12000},frequency:400,quantity:1,tint:[0xddeebb,0xccddaa]}).setDepth(3);
  }

  // ---- BACKGROUND ----
  drawBg(){
    const g=this.gBg;
    for(let y=0;y<GND+10;y++){const t=y/(GND+10);g.fillStyle(Phaser.Display.Color.GetColor(Math.floor(Phaser.Math.Linear(160,45,t)),Math.floor(Phaser.Math.Linear(200,85,t)),Math.floor(Phaser.Math.Linear(220,55,t))));g.fillRect(0,y,W,1);}
    g.fillStyle(0x3a5a3a,.4);g.beginPath();g.moveTo(0,180);g.lineTo(120,80);g.lineTo(250,140);g.lineTo(380,60);g.lineTo(500,120);g.lineTo(650,50);g.lineTo(780,100);g.lineTo(900,70);g.lineTo(W,150);g.lineTo(W,250);g.lineTo(0,250);g.closePath();g.fillPath();
    g.fillStyle(0x2a4a2a,.3);g.beginPath();g.moveTo(0,220);g.lineTo(150,150);g.lineTo(300,190);g.lineTo(450,130);g.lineTo(600,170);g.lineTo(750,120);g.lineTo(W,180);g.lineTo(W,280);g.lineTo(0,280);g.closePath();g.fillPath();
    g.fillStyle(0xffeeaa,.1);g.fillCircle(W-150,60,120);
    const tf=[[50,280,35],[130,260,40],[350,255,45],[620,250,40],[870,270,32]];
    for(const[tx,ty,ts]of tf){g.fillStyle(0x1a3a1a,.6);g.fillRect(tx-3,ty,6,40);g.fillTriangle(tx,ty-ts*1.2,tx-ts*.8,ty+5,tx+ts*.8,ty+5);}
    const tm=[[30,340,50],[160,320,55],[320,330,45],[700,310,60],[850,325,48]];
    for(const[tx,ty,ts]of tm){g.fillStyle(0x2a4020);g.fillRect(tx-4,ty,8,50);g.fillStyle(0x3a6030,.9);g.fillTriangle(tx,ty-ts,tx-ts*.7,ty+8,tx+ts*.7,ty+8);}
    g.fillStyle(0x3a2a18);g.fillRect(W-80,GND-120,20,125);g.fillStyle(0x2a5a20,.9);g.fillCircle(W-70,GND-150,50);g.fillStyle(0x3a7a30,.8);g.fillCircle(W-90,GND-130,35);
    g.fillStyle(0x3a5520);g.fillRect(0,GND+3,W,H-GND);
    g.fillStyle(0x5a9a40,.4);for(let i=0;i<60;i++){const gx=i*16+Math.random()*8;g.fillTriangle(gx,GND+3,gx-3,GND-4-Math.random()*6,gx+3,GND+3);}
    g.fillStyle(0x000000,.06);g.fillRoundedRect(198,GND+1,564,14,5);
    g.fillStyle(0x7a5540);g.fillRoundedRect(200,GND-3,560,13,4);
    g.fillStyle(0x9a7560);g.fillRoundedRect(202,GND-1,556,9,3);
  }

  // ---- MENTOR ----
  drawMentor(){
    const g=this.gMentor,mx=75,my=GND,sf=0xc0825a,sd=0x9a6540;
    g.fillStyle(0x7a5540,.5);g.fillRoundedRect(mx-32,my-1,64,7,2);
    g.lineStyle(11,sd);g.beginPath();g.moveTo(mx-14,my-10);g.lineTo(mx+8,my-4);g.strokePath();g.beginPath();g.moveTo(mx+14,my-10);g.lineTo(mx-8,my-4);g.strokePath();
    g.lineStyle(9,sf);g.beginPath();g.moveTo(mx-14,my-10);g.lineTo(mx+8,my-4);g.strokePath();g.beginPath();g.moveTo(mx+14,my-10);g.lineTo(mx-8,my-4);g.strokePath();
    g.lineStyle(16,sd);g.beginPath();g.moveTo(mx,my-10);g.lineTo(mx,my-52);g.strokePath();g.lineStyle(13,sf);g.beginPath();g.moveTo(mx,my-10);g.lineTo(mx,my-52);g.strokePath();
    g.lineStyle(8,sd);g.beginPath();g.moveTo(mx-10,my-44);g.lineTo(mx-22,my-22);g.lineTo(mx-16,my-12);g.strokePath();g.beginPath();g.moveTo(mx+10,my-44);g.lineTo(mx+22,my-22);g.lineTo(mx+16,my-12);g.strokePath();
    g.lineStyle(6,sf);g.beginPath();g.moveTo(mx-10,my-44);g.lineTo(mx-22,my-22);g.lineTo(mx-16,my-12);g.strokePath();g.beginPath();g.moveTo(mx+10,my-44);g.lineTo(mx+22,my-22);g.lineTo(mx+16,my-12);g.strokePath();
    g.fillStyle(sd);g.fillCircle(mx,my-63,12);g.fillStyle(sf);g.fillCircle(mx,my-63,10);
    g.lineStyle(1.2,sd,.6);g.beginPath();g.arc(mx-3,my-64,2.5,0,Math.PI);g.strokePath();g.beginPath();g.arc(mx+3,my-64,2.5,0,Math.PI);g.strokePath();
    g.fillStyle(0x3a2a1a);g.fillCircle(mx,my-75,5);
  }

  // ---- UI ----
  buildUI(){
    this.add.text(W/2,6,'YOGA ASHTANGA SIMULATOR',{fontFamily:FNT,fontSize:'17px',color:'#ddeedd',fontStyle:'bold',resolution:2}).setOrigin(.5,0).setDepth(20);
    this.add.text(W/2,26,'Sequence 1 – Surya Namaskar A',{fontFamily:FNT,fontSize:'11px',color:'#8aaa8a',resolution:2}).setOrigin(.5,0).setDepth(20);

    // Timeline dots
    this.dots=[];const dotY=44,dotGap=14,dotX=W/2-((SEQ.length-1)*dotGap)/2;
    for(let i=0;i<SEQ.length;i++) this.dots.push(this.add.circle(dotX+i*dotGap,dotY,3,0x555555,.4).setDepth(20));

    // Sanskrit count
    this.countTxt=this.add.text(W/2,58,'',{fontFamily:FNT,fontSize:'36px',color:'#eeffee',fontStyle:'bold',resolution:2}).setOrigin(.5,0).setDepth(20).setAlpha(0);
    // Pose name
    this.poseTxt=this.add.text(W/2,98,'',{fontFamily:FNT,fontSize:'13px',color:'#8aaa8a',resolution:2}).setOrigin(.5,0).setDepth(20).setAlpha(0);

    // Key combo display (shows which keys to hold)
    this.comboTxt=this.add.text(W/2,GND+20,'',{fontFamily:'monospace',fontSize:'18px',color:'#eeffee',fontStyle:'bold',resolution:2}).setOrigin(.5,0).setDepth(20);
    // Breath instruction
    this.breathInstr=this.add.text(W/2,GND+42,'',{fontFamily:FNT,fontSize:'12px',color:'#88bbcc',resolution:2}).setOrigin(.5,0).setDepth(20);

    // Score
    this.scoreTxt=this.add.text(W-14,8,'',{fontFamily:FNT,fontSize:'14px',color:'#ddeedd',fontStyle:'bold',resolution:2}).setOrigin(1,0).setDepth(20);
    this.streakTxt=this.add.text(W-14,26,'',{fontFamily:FNT,fontSize:'11px',color:'#8aaa8a',resolution:2}).setOrigin(1,0).setDepth(20);

    // Hold breath counter
    this.holdTxt=this.add.text(W/2,120,'',{fontFamily:FNT,fontSize:'20px',color:'#ddeedd',fontStyle:'bold',resolution:2}).setOrigin(.5,0).setDepth(20);

    // Instruction
    this.instrTxt=this.add.text(W/2,H-16,'Press SPACE to begin',{fontFamily:FNT,fontSize:'13px',color:'#fff',backgroundColor:'#00000044',padding:{x:12,y:4},resolution:2}).setOrigin(.5,.5).setDepth(20);

    // Retry
    this.retryBtn=this.add.text(W/2,H/2+100,'  Press R to retry  ',{fontFamily:FNT,fontSize:'16px',fontStyle:'bold',color:'#fff',backgroundColor:'#e67e22',padding:{x:16,y:8},resolution:2}).setOrigin(.5).setDepth(30).setVisible(false).setInteractive({useHandCursor:true});
    this.retryBtn.on('pointerdown',()=>this.scene.restart());
  }

  // ---- KEYS ----
  bindKeys(){
    // Use Phaser's global keyboard events (more reliable than addKey for multi-key)
    this.input.keyboard.on('keydown',(e)=>{
      if(!this.mStarted){this.mStarted=true;mStart();}
      const k=e.key.toUpperCase();
      if(['Q','W','E','A','D'].includes(k)) this.keys[k]=true;
      if(e.code==='Space'){e.preventDefault();this.keys.SPACE=true;if(this.st===ST.INTRO)this.beginSequence();}
      if(k==='R'&&this.st>=ST.COMPLETE) this.scene.restart();
      if(k==='M'){mP?mStop():mStart();}
    });
    this.input.keyboard.on('keyup',(e)=>{
      const k=e.key.toUpperCase();
      if(['Q','W','E','A','D'].includes(k)) this.keys[k]=false;
      if(e.code==='Space') this.keys.SPACE=false;
    });
  }

  // ---- BEGIN ----
  beginSequence(){
    this.vi=0;this.advanceTo(1);
  }

  advanceTo(idx){
    if(idx>=SEQ.length){this.onComplete();return;}
    this.vi=idx;const v=SEQ[idx];
    this.updateDots();
    // Tween ghost
    for(const k of['hip','handL','handR','footL','footR'])
      this.tweens.add({targets:this.ghost[k],x:v.tgt[k].x,y:v.tgt[k].y,duration:500,ease:'Sine.easeInOut'});
    this.tweens.add({targets:this,ghostSpa:v.tgt.spa,tgtSpa:v.tgt.spa,duration:500,ease:'Sine.easeInOut'});

    // UI updates
    if(v.count){this.countTxt.setText(v.count);this.countTxt.setAlpha(0);this.tweens.add({targets:this.countTxt,alpha:1,duration:300});sfxCount(idx);}
    else this.countTxt.setAlpha(0);
    this.poseTxt.setText(`${v.sans} — ${v.name}`);this.poseTxt.setAlpha(0);this.tweens.add({targets:this.poseTxt,alpha:.8,duration:400});

    // Key combo display
    const comboStr = v.keys.length > 0 ? v.keys.join(' + ') : '—';
    this.comboTxt.setText(comboStr);
    // Breath instruction
    if(v.breath==='in') this.breathInstr.setText('Hold SPACE to inhale').setColor('#88ccff');
    else if(v.breath==='out') this.breathInstr.setText('Release SPACE to exhale').setColor('#ffcc88');
    else this.breathInstr.setText('');

    this.poseBlend=0;

    if(v.type==='flow'||v.type==='end'){
      this.st=ST.FLOW;
      this.instrTxt.setText('Hold the right keys + breathe correctly');
    } else if(v.type==='hold'){
      this.st=ST.HOLD;
      this.holdBreaths=0;this.holdTimer=0;this.strain=0;
      this.instrTxt.setText('Hold the pose for 5 breaths!');
    }
  }

  updateDots(){
    for(let i=0;i<this.dots.length;i++){
      const d=this.dots[i];
      if(i<this.vi){d.setFillStyle(0x44ff88,1);d.setRadius(3);}
      else if(i===this.vi){d.setFillStyle(0xff9933,1);d.setRadius(5);d.setStrokeStyle(2,0xff9933,.5);}
      else{d.setFillStyle(0x555555,.4);d.setRadius(3);d.setStrokeStyle(0);}
    }
  }

  // ---- CHECK if player is holding correct combo + breath ----
  isCorrect(){
    const v=SEQ[this.vi];if(!v)return false;
    // Check key combo
    const required=v.keys;
    for(const k of required) if(!this.keys[k]) return false;
    // Check breath
    if(v.breath==='in' && !this.keys.SPACE) return false;
    if(v.breath==='out' && this.keys.SPACE) return false;
    return true;
  }

  // ---- BODY LERP ----
  updateBody(dt){
    const v=SEQ[this.vi];if(!v)return;
    const tgt=v.tgt;
    const correct=this.isCorrect();
    // When correct: blend toward target. When wrong: drift back toward standing.
    const blendTarget = correct ? 1 : 0;
    const blendSpeed = correct ? 3.5 : 1.5;
    this.poseBlend += (blendTarget - this.poseBlend) * blendSpeed * dt;
    this.poseBlend = Phaser.Math.Clamp(this.poseBlend, 0, 1);

    // Lerp body between standing (P.sama) and target
    for(const k of['hip','handL','handR','footL','footR']){
      this.cur[k].x = Phaser.Math.Linear(P.sama[k].x, tgt[k].x, this.poseBlend);
      this.cur[k].y = Phaser.Math.Linear(P.sama[k].y, tgt[k].y, this.poseBlend);
    }

    // Spine angle
    let diff=this.tgtSpa-this.curSpa;
    if(diff>Math.PI)diff-=Math.PI*2;if(diff<-Math.PI)diff+=Math.PI*2;
    const spaTgt = Phaser.Math.Linear(P.sama.spa, this.tgtSpa, this.poseBlend);
    this.curSpa += (spaTgt - this.curSpa) * 4 * dt;
  }

  // ---- BREATH ----
  updateBreath(dt){
    if(this.keys.SPACE){
      this.breath = Math.min(1, this.breath + dt * 0.8); // fill in ~1.2s
    } else {
      this.breath = Math.max(0, this.breath - dt * 0.6); // empty in ~1.7s
    }
  }

  // ---- DRAW BREATH CIRCLE ----
  drawBreathCircle(){
    const g=this.gBreath;g.clear();
    if(this.st<ST.FLOW)return;

    // Position: right side of screen
    const cx=W-70, cy=H/2-30;
    const minR=15, maxR=50;
    const r=minR+(maxR-minR)*this.breath;

    // Outer glow
    const inhaling=this.keys.SPACE;
    const glowCol=inhaling?0x88ccff:0xffcc88;
    const glowA=.06+this.breath*.08;
    g.fillStyle(glowCol,glowA);g.fillCircle(cx,cy,r+20);
    g.fillStyle(glowCol,glowA*.6);g.fillCircle(cx,cy,r+35);

    // Main circle
    g.lineStyle(3,glowCol,.4+this.breath*.3);g.strokeCircle(cx,cy,r);
    g.fillStyle(glowCol,.08+this.breath*.12);g.fillCircle(cx,cy,r);

    // Inner ring
    g.lineStyle(1,glowCol,.2);g.strokeCircle(cx,cy,r*.5);

    // Label
    if(!this._breathLabel) this._breathLabel=this.add.text(cx,cy+maxR+14,'',{fontFamily:FNT,fontSize:'11px',color:'#8aaa8a',resolution:2}).setOrigin(.5,0).setDepth(20);
    this._breathLabel.setText(inhaling?'INHALE':'EXHALE');
    this._breathLabel.setColor(inhaling?'#88ccff':'#ffcc88');
  }

  // ---- DRAW ----
  drawGhost(){
    const g=this.gGhost;g.clear();
    const s=skel(this.ghost,this.ghostSpa);
    for(const bn of BONES){const a=s[bn.a],b=s[bn.b];if(!a||!b)continue;
      g.lineStyle(bn.w+2,0x64c8dc,.05);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.strokePath();
      g.lineStyle(bn.w-2,0x64c8dc,.12);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.strokePath();}
    g.fillStyle(0x64c8dc,.08);g.fillCircle(s.head.x,s.head.y,18);
  }

  drawBody(){
    const g=this.gBody;g.clear();
    this.sk=skel(this.cur,this.curSpa);
    const sf=0xd4956b,ss=0xb07850;

    // Aura when aligned
    if(this.poseBlend>.5){
      const cx=(this.sk.hip.x+this.sk.chest.x)/2,cy=(this.sk.hip.y+this.sk.chest.y)/2;
      const a=.02+(this.poseBlend-.5)*.08;
      const gc=this.isCorrect()?0x88ffaa:0x88ccff;
      g.fillStyle(gc,a);g.fillCircle(cx,cy,60+this.poseBlend*15);
    }

    for(const bn of BONES){const a=this.sk[bn.a],b=this.sk[bn.b];if(!a||!b)continue;
      g.lineStyle(bn.w+3,ss,1);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.strokePath();
      g.lineStyle(bn.w,sf,1);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.strokePath();}
    for(const jp of['chest','shL','shR','hipL','hipR','elbL','elbR','knL','knR']){const pt=this.sk[jp];if(!pt)continue;g.fillStyle(sf);g.fillCircle(pt.x,pt.y,jp.includes('elb')||jp.includes('kn')?6:7);}
    for(const ep of['handL','handR','footL','footR']){const pt=this.sk[ep];if(!pt)continue;g.fillStyle(sf);g.fillCircle(pt.x,pt.y,ep[0]==='h'?5:6);g.fillStyle(ss);g.fillCircle(pt.x,pt.y,ep[0]==='h'?3:4);}
    const hd=this.sk.head,nk=this.sk.neck;
    if(hd&&nk){g.fillStyle(ss);g.fillCircle(hd.x,hd.y,18);g.fillStyle(sf);g.fillCircle(hd.x,hd.y,16);
      const fa=Math.atan2(hd.y-nk.y,hd.x-nk.x),px=-Math.sin(fa)*5;
      g.fillStyle(ss);g.fillCircle(hd.x+px+Math.cos(fa)*4,hd.y+Math.cos(fa)*5+Math.sin(fa)*4,2);
      g.fillCircle(hd.x-px+Math.cos(fa)*4,hd.y-Math.cos(fa)*5+Math.sin(fa)*4,2);}
  }

  drawKeyUI(){
    const g=this.gUI;g.clear();if(this.st>=ST.COMPLETE)return;
    const v=SEQ[this.vi];if(!v)return;
    const required=v.keys;
    // Draw small key indicators near the combo text
    const allKeys=['Q','W','E','A','D'];
    const kx=W/2, ky=GND+20;
    const positions={Q:{x:kx-50,y:ky},W:{x:kx-25,y:ky},E:{x:kx,y:ky},A:{x:kx+25,y:ky},D:{x:kx+50,y:ky}};

    // Instead, show which keys are correct/held above the combo text
    for(const k of allKeys){
      const isRequired=required.includes(k);
      const isHeld=this.keys[k];
      if(!isRequired)continue;
      // Green ring if held, red if not
      // (the combo text already shows the keys, so we just color the key boxes below the mat)
    }

    // Show correct/incorrect feedback on combo text color
    if(this.st===ST.FLOW||this.st===ST.HOLD){
      const correct=this.isCorrect();
      const v=SEQ[this.vi];
      const keysOk=v.keys.every(k=>this.keys[k]);
      const breathOk=(v.breath==='in'&&this.keys.SPACE)||(v.breath==='out'&&!this.keys.SPACE)||(v.breath===null);
      this.comboTxt.setColor(keysOk?'#44ff88':'#ff8866');
      this.breathInstr.setAlpha(breathOk?.5:1);
    }
  }

  // ---- UPDATE ----
  update(time,delta){
    try{
      const dt=Math.min(delta/1000,.05);
      if(this.st===ST.INTRO)return;

      this.updateBreath(dt);
      this.updateBody(dt);
      this.drawGhost();this.drawBody();this.drawBreathCircle();this.drawKeyUI();

      if(this.st===ST.FLOW) this.tickFlow(dt);
      else if(this.st===ST.HOLD) this.tickHold(dt);
    }catch(e){console.error('Update:',e);}
  }

  // ---- FLOW ----
  tickFlow(dt){
    const correct=this.isCorrect();
    if(correct && this.poseBlend>.92){
      // Pose achieved! Score and advance.
      this.poseBlend=1;
      const baseScore=120;
      this.streak++;
      const mul=1+Math.min(this.streak,10)*.1;
      const pts=Math.floor(baseScore*mul);
      this.score+=pts;
      this.scoreTxt.setText(`Score: ${this.score}`);
      this.streakTxt.setText(this.streak>1?`Streak ${this.streak}x`:'');
      sfxSnap();

      const pop=this.add.text(W/2,GND-20,`+${pts}`,{fontFamily:FNT,fontSize:'18px',color:'#44ff88',fontStyle:'bold',resolution:2}).setOrigin(.5).setDepth(25);
      this.tweens.add({targets:pop,y:GND-60,alpha:0,duration:800,onComplete:()=>pop.destroy()});

      const h=this.sk.head;if(h){this.breathE.setPosition(h.x,h.y-12);this.breathE.explode(4);}

      const v=SEQ[this.vi];
      if(v.type==='end'){this.time.delayedCall(300,()=>this.onComplete());return;}
      this.st=-1; // brief pause state to prevent re-triggering
      this.time.delayedCall(500,()=>this.advanceTo(this.vi+1));
    } else if(!correct && this.poseBlend<.1){
      this.streak=0;
    }
  }

  // ---- HOLD (DD) ----
  tickHold(dt){
    const v=SEQ[this.vi];
    const correct=this.isCorrect();

    // Breath cycle tracking for hold
    // A full breath = Space held then released (in+out)
    if(correct && this.poseBlend>.7){
      this.holdTimer+=dt;

      // One full breath cycle: ~4 seconds (2s inhale holding space, 2s exhale releasing)
      // We detect transitions: was inhaling (space held), now exhaling (space released) = 1 breath
      if(!this._wasInhaling && this.keys.SPACE && this.breath>.5){
        this._wasInhaling=true;
      }
      if(this._wasInhaling && !this.keys.SPACE && this.breath<.3){
        this._wasInhaling=false;
        this.holdBreaths++;
        sfxBreath();
        const pts=Math.floor(80*(1-this.strain));
        this.score+=pts;this.scoreTxt.setText(`Score: ${this.score}`);
        const pop=this.add.text(W/2,GND-20,`+${pts}`,{fontFamily:FNT,fontSize:'16px',color:'#44ff88',fontStyle:'bold',resolution:2}).setOrigin(.5).setDepth(25);
        this.tweens.add({targets:pop,y:GND-50,alpha:0,duration:600,onComplete:()=>pop.destroy()});

        if(this.holdBreaths>=v.breaths){
          this.score+=200;this.scoreTxt.setText(`Score: ${this.score}`);
          sfxSnap();
          this.holdTxt.setText('');
          this.time.delayedCall(500,()=>this.advanceTo(this.vi+1));
          this.st=-1;return;
        }
      }

      this.strain=Math.max(0,this.strain-.02*dt);
    } else {
      this.strain+=.15*dt;
      if(this.strain>=1){this.onFail();return;}
    }

    this.holdTxt.setText(`Breath ${this.holdBreaths} / ${v.breaths}`);
    this.instrTxt.setText(correct?'Hold pose — breathe in (Space) and out (release)':'Hold the right keys!');
  }

  // ---- COMPLETE ----
  onComplete(){
    this.st=ST.COMPLETE;this.score+=500;sfxWin();
    this.instrTxt.setText('');this.holdTxt.setText('');this.countTxt.setAlpha(0);this.comboTxt.setText('');this.breathInstr.setText('');
    if(this._breathLabel)this._breathLabel.setVisible(false);this.gBreath.clear();

    const grades=[{min:3500,g:'S'},{min:2800,g:'A'},{min:2000,g:'B'},{min:1200,g:'C'},{min:600,g:'D'},{min:0,g:'F'}];
    const grade=grades.find(g=>this.score>=g.min).g;

    const nm=this.add.text(W/2,H/2-90,'Namaste!',{fontFamily:FNT,fontSize:'52px',color:'#4caf50',fontStyle:'bold',stroke:'#fff',strokeThickness:4,resolution:2}).setOrigin(.5).setDepth(30).setAlpha(0);
    this.tweens.add({targets:nm,alpha:1,scaleX:[.3,1],scaleY:[.3,1],duration:500,ease:'Back.easeOut'});
    this.add.text(W/2,H/2-35,'Sequence 1 Complete',{fontFamily:FNT,fontSize:'16px',color:'#ddeedd',resolution:2}).setOrigin(.5).setDepth(30);
    this.add.text(W/2,H/2-5,`Score: ${this.score}   Grade: ${grade}`,{fontFamily:FNT,fontSize:'16px',color:'#eeffee',fontStyle:'bold',resolution:2}).setOrigin(.5).setDepth(30);
    this.add.text(W/2,H/2+25,`Flow streak: ${this.streak}`,{fontFamily:FNT,fontSize:'13px',color:'#aaccaa',resolution:2}).setOrigin(.5).setDepth(30);

    for(let i=0;i<6;i++){const em=this.add.particles(W/2,-10,`cf${i}`,{x:{min:-W/2,max:W/2},speed:{min:80,max:250},angle:{min:70,max:110},rotate:{min:0,max:360},scale:{start:1,end:.4},lifespan:2800,gravityY:120,quantity:2,frequency:60,maxParticles:25}).setDepth(25);this.time.delayedCall(2800,()=>em.destroy());}
    this.time.delayedCall(1500,()=>this.retryBtn.setVisible(true));
  }

  onFail(){
    this.st=ST.FAIL;sfxFail();
    this.cameras.main.shake(400,.008);
    if(this._breathLabel)this._breathLabel.setVisible(false);this.gBreath.clear();
    this.add.text(W/2,H/2-60,'Collapsed!',{fontFamily:FNT,fontSize:'42px',color:'#e74c3c',fontStyle:'bold',stroke:'#fff',strokeThickness:4,resolution:2}).setOrigin(.5).setDepth(30);
    this.instrTxt.setText('');this.holdTxt.setText('');this.comboTxt.setText('');this.breathInstr.setText('');
    this.time.delayedCall(1200,()=>this.retryBtn.setVisible(true));
  }
}

new Phaser.Game({type:Phaser.AUTO,width:W,height:H,backgroundColor:'#1a2a1a',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},scene:[Game]});
</script>
