<script>
// =============================================================================
// YOGA ASHTANGA SIMULATOR — SURYA NAMASKAR A
// =============================================================================
// A flowing Sun Salutation A sequence. 9 vinyasas synced to breath.
//
// CONTROLS:
//   Q = Left Hand    W = Hips    E = Right Hand
//        A = Left Foot    D = Right Foot
//   SPACE = breathe (at breath bar peak)
//   M = toggle music    R = retry
//
// FLOW: Each vinyasa has a breath bar that fills (inhale) or empties (exhale).
// Press SPACE at the peak to complete the breath. Body drifts toward the next
// pose automatically. Downward Dog is a 5-breath hold ("boss" of the sequence).
// =============================================================================

const W = 960, H = 660, GND = 520;

// ---- CONTROLS ----
const CP = [
  { id:'handL', label:'L.HAND', kb:'Q', col:'#4499ff' },
  { id:'hip',   label:'HIPS',   kb:'W', col:'#ff9933' },
  { id:'handR', label:'R.HAND', kb:'E', col:'#4499ff' },
  { id:'footL', label:'L.FOOT', kb:'A', col:'#44cc77' },
  { id:'footR', label:'R.FOOT', kb:'D', col:'#44cc77' },
];

// ---- BODY ----
const B = { spine:105, neck:30, uArm:72, lArm:66, shW:24, uLeg:82, lLeg:74, hipW:13 };
const LW = { torso:30, neck:18, uArm:15, lArm:13, uLeg:19, lLeg:16 };

// ---- POSE TARGETS (7 unique shapes) ----
const P_SAMA = { // Samasthiti — standing neutral
  hip:{x:460,y:GND-155}, handL:{x:438,y:GND-55}, handR:{x:482,y:GND-55},
  footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:-Math.PI/2,
};
const P_URDHVA = { // Urdhva Hastasana — arms up
  hip:{x:460,y:GND-155}, handL:{x:448,y:GND-285}, handR:{x:472,y:GND-285},
  footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:-Math.PI/2-0.15,
};
const P_UTTANA = { // Uttanasana — forward fold
  hip:{x:460,y:GND-150}, handL:{x:440,y:GND-5}, handR:{x:470,y:GND-5},
  footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:0.9,
};
const P_ARDHA = { // Ardha Uttanasana — half lift, flat back
  hip:{x:490,y:GND-145}, handL:{x:405,y:GND-5}, handR:{x:435,y:GND-5},
  footL:{x:447,y:GND}, footR:{x:473,y:GND}, spa:-0.1,
};
const P_CHATUR = { // Chaturanga Dandasana — low plank
  hip:{x:470,y:GND-50}, handL:{x:345,y:GND-5}, handR:{x:370,y:GND-5},
  footL:{x:595,y:GND-5}, footR:{x:620,y:GND-5}, spa:0.05,
};
const P_UPDOG = { // Urdhva Mukha Svanasana — upward dog
  hip:{x:500,y:GND-45}, handL:{x:350,y:GND-5}, handR:{x:375,y:GND-5},
  footL:{x:610,y:GND-5}, footR:{x:635,y:GND-5}, spa:-0.35,
};
const P_DDOG = { // Adho Mukha Svanasana — downward dog
  hip:{x:470,y:GND-215}, handL:{x:280,y:GND-3}, handR:{x:305,y:GND-3},
  footL:{x:610,y:GND-2}, footR:{x:635,y:GND-2}, spa:2.2,
};

// Collapsed (gravity rest)
const COLLAPSED = {
  hip:{x:470,y:GND-25}, handL:{x:390,y:GND-3}, handR:{x:550,y:GND-3},
  footL:{x:410,y:GND}, footR:{x:530,y:GND},
};

// ---- SURYA NAMASKAR A SEQUENCE ----
const SEQ = [
  { name:'Samasthiti',           sans:'Samasthiti',             count:null,      breath:null,     type:'start', tgt:P_SAMA,   breaths:0 },
  { name:'Arms Up',              sans:'Urdhva Hastasana',       count:'Ekam',    breath:'in',     type:'flow',  tgt:P_URDHVA, breaths:1 },
  { name:'Forward Fold',         sans:'Uttanasana',             count:'Dve',     breath:'out',    type:'flow',  tgt:P_UTTANA, breaths:1 },
  { name:'Half Lift',            sans:'Ardha Uttanasana',       count:'Trini',   breath:'in',     type:'flow',  tgt:P_ARDHA,  breaths:1 },
  { name:'Low Plank',            sans:'Chaturanga Dandasana',   count:'Chatvari',breath:'out',    type:'flow',  tgt:P_CHATUR, breaths:1 },
  { name:'Upward Dog',           sans:'Urdhva Mukha Svanasana', count:'Panca',   breath:'in',     type:'flow',  tgt:P_UPDOG,  breaths:1 },
  { name:'Downward Dog',         sans:'Adho Mukha Svanasana',   count:'Ṣaṭ',    breath:'out',    type:'hold',  tgt:P_DDOG,   breaths:5 },
  { name:'Half Lift',            sans:'Ardha Uttanasana',       count:'Sapta',   breath:'in',     type:'flow',  tgt:P_ARDHA,  breaths:1 },
  { name:'Forward Fold',         sans:'Uttanasana',             count:'Aṣṭau',  breath:'out',    type:'flow',  tgt:P_UTTANA, breaths:1 },
  { name:'Arms Up',              sans:'Urdhva Hastasana',       count:'Nava',    breath:'in',     type:'flow',  tgt:P_URDHVA, breaths:1 },
  { name:'Samasthiti',           sans:'Samasthiti',             count:null,      breath:'out',    type:'end',   tgt:P_SAMA,   breaths:0 },
];

// ---- QUOTES ----
const Q_IDLE=['"Inhale the future, exhale the past."','"The pose begins when you want to leave it."','"Breathe, and let go."','"Do your practice and all is coming."','"Your body can do it. It\'s your mind you need to convince."'];
const Q_SNAP=['"Yes! Feel it."','"Good. Hold that."','"Beautiful form."','"Your body remembers."'];
const Q_FAIL=['"Fall seven times, stand up eight."','"Every stumble is a step forward."','"Try again. Fail better."'];
const Q_WIN=['"Namaste. The light in me honors the light in you."','"The body achieves what the mind believes."'];

// ---- IK ----
function ik(root,tgt,lA,lB,bend){
  const dx=tgt.x-root.x,dy=tgt.y-root.y,d=Math.sqrt(dx*dx+dy*dy)||.01;
  if(d>=lA+lB-1){const t=lA/(lA+lB);return{x:root.x+dx*t,y:root.y+dy*t};}
  const ed=Math.max(d,Math.abs(lA-lB)+1);
  const ca=Phaser.Math.Clamp((lA*lA+ed*ed-lB*lB)/(2*lA*ed),-1,1);
  const aa=Math.acos(ca),ba=Math.atan2(dy,dx),ja=ba+aa*bend;
  const rx=root.x+Math.cos(ja)*lA,ry=root.y+Math.sin(ja)*lA;
  if(isNaN(rx)||isNaN(ry))return{x:(root.x+tgt.x)/2,y:(root.y+tgt.y)/2};
  return{x:rx,y:ry};
}

// Skeleton from 5 control points + explicit spine angle
function skel(cp, spineAngle){
  const s={};
  s.hip={x:cp.hip.x,y:cp.hip.y};
  const spa = isNaN(spineAngle) ? -Math.PI/2 : spineAngle;
  s.chest={x:s.hip.x+Math.cos(spa)*B.spine,y:s.hip.y+Math.sin(spa)*B.spine};
  s.neck={x:s.chest.x+Math.cos(spa)*B.neck*.55,y:s.chest.y+Math.sin(spa)*B.neck*.55};
  s.head={x:s.chest.x+Math.cos(spa)*B.neck,y:s.chest.y+Math.sin(spa)*B.neck};
  const pa=spa+Math.PI/2;
  s.shL={x:s.chest.x-Math.cos(pa)*B.shW,y:s.chest.y-Math.sin(pa)*B.shW};
  s.shR={x:s.chest.x+Math.cos(pa)*B.shW,y:s.chest.y+Math.sin(pa)*B.shW};
  const elbBL=cp.handL.y<s.shL.y?1:-1, elbBR=cp.handR.y<s.shR.y?-1:1;
  s.elbL=ik(s.shL,cp.handL,B.uArm,B.lArm,elbBL);
  s.elbR=ik(s.shR,cp.handR,B.uArm,B.lArm,elbBR);
  s.handL={x:cp.handL.x,y:cp.handL.y};s.handR={x:cp.handR.x,y:cp.handR.y};
  s.hipL={x:s.hip.x-B.hipW,y:s.hip.y};s.hipR={x:s.hip.x+B.hipW,y:s.hip.y};
  const knBL=cp.footL.x<s.hip.x?1:-1, knBR=cp.footR.x<s.hip.x?1:-1;
  s.knL=ik(s.hipL,cp.footL,B.uLeg,B.lLeg,knBL);
  s.knR=ik(s.hipR,cp.footR,B.uLeg,B.lLeg,knBR);
  s.footL={x:cp.footL.x,y:cp.footL.y};s.footR={x:cp.footR.x,y:cp.footR.y};
  return s;
}

const BONES=[
  {a:'hip',b:'chest',w:LW.torso},{a:'chest',b:'neck',w:LW.neck},
  {a:'shL',b:'elbL',w:LW.uArm},{a:'elbL',b:'handL',w:LW.lArm},
  {a:'shR',b:'elbR',w:LW.uArm},{a:'elbR',b:'handR',w:LW.lArm},
  {a:'hipL',b:'knL',w:LW.uLeg},{a:'knL',b:'footL',w:LW.lLeg},
  {a:'hipR',b:'knR',w:LW.uLeg},{a:'knR',b:'footR',w:LW.lLeg},
];

// ---- AUDIO ----
let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,d,v){const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v||.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}
function sfxSnap(){beep(880,.08,.1);}
function sfxBreath(){beep(660,.12,.06);setTimeout(()=>beep(880,.12,.04),80);}
function sfxWin(){beep(523,.2,.1);setTimeout(()=>beep(659,.2,.1),150);setTimeout(()=>beep(784,.3,.1),300);}
function sfxFail(){beep(220,.3,.1);setTimeout(()=>beep(180,.4,.1),200);}
function sfxFlow(){beep(440,.1,.05);setTimeout(()=>beep(550,.1,.04),60);}
function sfxCount(n){beep(330+n*40,.15,.06);}

// ---- MUSIC ----
let mPlaying=false,mNodes=[];
function mStart(){
  if(mPlaying)return;mPlaying=true;const c=ac();
  const m=c.createGain();m.gain.value=0;m.connect(c.destination);m.gain.linearRampToValueAtTime(.1,c.currentTime+3);
  [130.81,196,261.63].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain(),l=c.createOscillator(),lg=c.createGain();
    o.type='sine';o.frequency.value=f;l.type='sine';l.frequency.value=.15+i*.08;
    lg.gain.value=f*.003;l.connect(lg);lg.connect(o.frequency);
    g.gain.value=i===0?.4:i===1?.25:.2;o.connect(g);g.connect(m);o.start();l.start();
    mNodes.push(o,l,g,lg);
  });
  function bowl(){
    if(!mPlaying)return;const c2=ac();
    const f=[261.63,293.66,329.63,392,440,523.25][Math.floor(Math.random()*6)];
    const o=c2.createOscillator(),g=c2.createGain();o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(.05,c2.currentTime);g.gain.exponentialRampToValueAtTime(.001,c2.currentTime+4);
    o.connect(g);g.connect(m);o.start();o.stop(c2.currentTime+4);
    setTimeout(bowl,3000+Math.random()*6000);
  }
  setTimeout(bowl,2000);mNodes.push(m);
}
function mStop(){if(!mPlaying)return;mPlaying=false;const c=ac();mNodes.forEach(n=>{try{if(n.gain)n.gain.linearRampToValueAtTime(0,c.currentTime+1);}catch(e){}try{n.stop&&n.stop(c.currentTime+1.5);}catch(e){}});mNodes=[];}

// ---- STATES ----
const ST={
  INTRO:0, FLOW:1, FLOW_PEAK:2, HOLD_SETUP:3, HOLD_LOCK:4, HOLD_BREATH:5, COMPLETE:6, FAIL:7,
};

// ===========================================================================
class Game extends Phaser.Scene {
  constructor(){super('Game');}

  create(){
    // Sequence state
    this.vi=0; // vinyasa index in SEQ
    this.st=ST.INTRO;
    this.score=0;
    this.streak=0;

    // Control points + velocity
    this.p={};this.v={};
    for(const c of CP){
      this.p[c.id]={x:P_SAMA[c.id].x,y:P_SAMA[c.id].y};
      this.v[c.id]={x:0,y:0};
    }
    this.held={};this.snapped={};this.pulse={};
    for(const c of CP){this.held[c.id]=false;this.snapped[c.id]=false;this.pulse[c.id]=0;}

    // Spine angle (interpolated)
    this.curSpa=P_SAMA.spa;
    this.tgtSpa=P_SAMA.spa;

    // Breath state
    this.breathFill=0; this.breathDir=0; this.breathWindow=false; this.breathHit=false;
    this._breathTimeout=null;
    // Hold-specific
    this.holdBreathN=0; this.strain=0;

    // Ghost target (tweened)
    this.ghostTgt={};
    for(const c of CP) this.ghostTgt[c.id]={x:P_SAMA[c.id].x,y:P_SAMA[c.id].y};
    this.ghostSpa=P_SAMA.spa;

    this.sk=skel(this.p,this.curSpa);

    // Graphics
    this.gBg=this.add.graphics().setDepth(0);
    this.gMentor=this.add.graphics().setDepth(1);
    this.gGhost=this.add.graphics().setDepth(2);
    this.gBody=this.add.graphics().setDepth(5);
    this.gBreath=this.add.graphics().setDepth(7);
    this.gUI=this.add.graphics().setDepth(8);

    this.makeTex();
    this.drawBg();
    this.drawMentor();
    this.buildUI();
    this.bindKeys();

    this.ghostA=0;
    this.mStarted=false;
    this.input.keyboard.on('keydown',()=>{if(!this.mStarted){this.mStarted=true;mStart();}});

    // Wisdom text
    this.wisdomTxt=this.add.text(14,GND+18,'',{fontFamily:'Georgia,serif',fontSize:'11px',color:'#aaddaa',fontStyle:'italic',wordWrap:{width:200}}).setDepth(20).setAlpha(.7);
    this.showWisdom(Q_IDLE[0]);
    this.quoteTimer=this.time.addEvent({delay:9000,loop:true,callback:()=>{
      if(this.st<=ST.HOLD_BREATH)this.showWisdom(Q_IDLE[Math.floor(Math.random()*Q_IDLE.length)]);
    }});
  }

  showWisdom(t){if(this.wisdomTxt){this.wisdomTxt.setText(t.replace(/\n/g,' '));this.wisdomTxt.setAlpha(0);this.tweens.add({targets:this.wisdomTxt,alpha:.7,duration:600});}}

  shutdown(){
    if(this.quoteTimer)this.quoteTimer.remove();
    if(this._breathTimeout){this._breathTimeout.remove();this._breathTimeout=null;}
  }

  // ---- TEXTURES ----
  makeTex(){
    if(!this.textures.exists('pt')){
      let g=this.add.graphics();g.fillStyle(0xffffff);g.fillCircle(3,3,3);g.generateTexture('pt',6,6);g.destroy();
      g=this.add.graphics();g.fillStyle(0xfff8e0);g.fillCircle(2,2,2);g.generateTexture('dust',4,4);g.destroy();
      [0xff6b6b,0xffd93d,0x6bcb77,0x4d96ff,0xff8c32,0xc77dff].forEach((c,i)=>{
        const cg=this.add.graphics();cg.fillStyle(c);cg.fillRect(0,0,8,5);cg.generateTexture(`cf${i}`,8,5);cg.destroy();
      });
    }
    this.snapE=this.add.particles(0,0,'pt',{speed:{min:30,max:80},scale:{start:.6,end:0},lifespan:400,tint:0x44ff88,frequency:-1,quantity:8}).setDepth(10);
    this.sweatE=this.add.particles(0,0,'pt',{speed:{min:15,max:50},angle:{min:220,max:320},scale:{start:.5,end:0},lifespan:700,tint:0x88ccff,frequency:-1,quantity:2}).setDepth(10);
    this.breathE=this.add.particles(0,0,'pt',{speed:{min:8,max:20},angle:{min:240,max:300},scale:{start:.6,end:0},lifespan:500,tint:0xffffff,alpha:{start:.5,end:0},frequency:-1,quantity:3}).setDepth(10);
    this.add.particles(0,0,'dust',{x:{min:0,max:W},y:{min:0,max:GND-30},speedX:{min:-3,max:3},speedY:{min:-5,max:-1},scale:{min:.3,max:1},alpha:{min:.08,max:.25},lifespan:{min:6000,max:12000},frequency:400,quantity:1,tint:[0xddeebb,0xccddaa,0xeeff88]}).setDepth(3);
  }

  // ---- BACKGROUND (forest) ----
  drawBg(){
    const g=this.gBg;
    for(let y=0;y<GND+10;y++){const t=y/(GND+10);g.fillStyle(Phaser.Display.Color.GetColor(
      Math.floor(Phaser.Math.Linear(160,45,t)),Math.floor(Phaser.Math.Linear(200,85,t)),Math.floor(Phaser.Math.Linear(220,55,t))));g.fillRect(0,y,W,1);}
    g.fillStyle(0x3a5a3a,.4);g.beginPath();g.moveTo(0,180);g.lineTo(120,80);g.lineTo(250,140);g.lineTo(380,60);g.lineTo(500,120);g.lineTo(650,50);g.lineTo(780,100);g.lineTo(900,70);g.lineTo(W,150);g.lineTo(W,250);g.lineTo(0,250);g.closePath();g.fillPath();
    g.fillStyle(0x2a4a2a,.3);g.beginPath();g.moveTo(0,220);g.lineTo(150,150);g.lineTo(300,190);g.lineTo(450,130);g.lineTo(600,170);g.lineTo(750,120);g.lineTo(W,180);g.lineTo(W,280);g.lineTo(0,280);g.closePath();g.fillPath();
    g.fillStyle(0xffeeaa,.1);g.fillCircle(W-150,60,120);g.fillStyle(0xffffff,.06);g.fillCircle(W-150,60,40);
    const tf=[[50,280,35],[130,260,40],[220,270,30],[350,255,45],[500,265,35],[620,250,40],[780,260,38],[870,270,32]];
    for(const[tx,ty,ts]of tf){g.fillStyle(0x1a3a1a,.6);g.fillRect(tx-3,ty,6,40);g.fillTriangle(tx,ty-ts*1.2,tx-ts*.8,ty+5,tx+ts*.8,ty+5);}
    const tm=[[30,340,50],[160,320,55],[320,330,45],[700,310,60],[850,325,48]];
    for(const[tx,ty,ts]of tm){g.fillStyle(0x2a4020);g.fillRect(tx-4,ty,8,50);g.fillStyle(0x3a6030,.9);g.fillTriangle(tx,ty-ts,tx-ts*.7,ty+8,tx+ts*.7,ty+8);g.fillStyle(0x4a7a40,.7);g.fillTriangle(tx,ty-ts*1.1,tx-ts*.5,ty,tx+ts*.5,ty);}
    // Large tree right
    g.fillStyle(0x3a2a18);g.fillRect(W-80,GND-120,20,125);
    g.fillStyle(0x2a5a20,.9);g.fillCircle(W-70,GND-150,50);g.fillStyle(0x3a7a30,.8);g.fillCircle(W-90,GND-130,35);g.fillStyle(0x3a6a28,.7);g.fillCircle(W-50,GND-135,40);
    // Bushes
    const bsh=[[20,GND-5,30],[80,GND,25],[180,GND-3,20],[W-180,GND-2,22],[W-40,GND,18]];
    for(const[bx,by,bs]of bsh){g.fillStyle(0x3a6a2a,.8);g.fillCircle(bx,by-bs*.4,bs*.6);g.fillCircle(bx-bs*.4,by-bs*.2,bs*.4);g.fillCircle(bx+bs*.4,by-bs*.2,bs*.5);}
    // Ground
    g.fillStyle(0x3a5520);g.fillRect(0,GND+3,W,H-GND);g.fillStyle(0x2a4518,.6);g.fillRect(0,GND+3,W,6);
    g.fillStyle(0x5a9a40,.4);for(let i=0;i<60;i++){const gx=i*16+Math.random()*8;g.fillTriangle(gx,GND+3,gx-3,GND-4-Math.random()*6,gx+3,GND+3);}
    // Mat
    g.fillStyle(0x000000,.06);g.fillRoundedRect(198,GND+1,564,14,5);
    g.fillStyle(0x7a5540);g.fillRoundedRect(200,GND-3,560,13,4);
    g.fillStyle(0x9a7560);g.fillRoundedRect(202,GND-1,556,9,3);
    // Flowers
    [[100,GND-2,0xff6688],[250,GND,0xffaa44],[680,GND-1,0xcc88ff],[780,GND,0xff8866]].forEach(([fx,fy,fc])=>{
      g.fillStyle(0x3a7a2a);g.fillRect(fx,fy-6,1,6);g.fillStyle(fc,.8);g.fillCircle(fx,fy-8,3);g.fillStyle(0xffee88);g.fillCircle(fx,fy-8,1.5);
    });
  }

  // ---- MENTOR ----
  drawMentor(){
    const g=this.gMentor,mx=75,my=GND,sf=0xc0825a,sd=0x9a6540;
    g.fillStyle(0x7a5540,.5);g.fillRoundedRect(mx-32,my-1,64,7,2);
    g.lineStyle(11,sd);g.beginPath();g.moveTo(mx-14,my-10);g.lineTo(mx+8,my-4);g.strokePath();g.beginPath();g.moveTo(mx+14,my-10);g.lineTo(mx-8,my-4);g.strokePath();
    g.lineStyle(9,sf);g.beginPath();g.moveTo(mx-14,my-10);g.lineTo(mx+8,my-4);g.strokePath();g.beginPath();g.moveTo(mx+14,my-10);g.lineTo(mx-8,my-4);g.strokePath();
    g.lineStyle(16,sd);g.beginPath();g.moveTo(mx,my-10);g.lineTo(mx,my-52);g.strokePath();
    g.lineStyle(13,sf);g.beginPath();g.moveTo(mx,my-10);g.lineTo(mx,my-52);g.strokePath();
    g.lineStyle(8,sd);g.beginPath();g.moveTo(mx-10,my-44);g.lineTo(mx-22,my-22);g.lineTo(mx-16,my-12);g.strokePath();g.beginPath();g.moveTo(mx+10,my-44);g.lineTo(mx+22,my-22);g.lineTo(mx+16,my-12);g.strokePath();
    g.lineStyle(6,sf);g.beginPath();g.moveTo(mx-10,my-44);g.lineTo(mx-22,my-22);g.lineTo(mx-16,my-12);g.strokePath();g.beginPath();g.moveTo(mx+10,my-44);g.lineTo(mx+22,my-22);g.lineTo(mx+16,my-12);g.strokePath();
    g.fillStyle(sd);g.fillCircle(mx,my-63,12);g.fillStyle(sf);g.fillCircle(mx,my-63,10);
    g.lineStyle(1.2,sd,.6);g.beginPath();g.arc(mx-3,my-64,2.5,0,Math.PI);g.strokePath();g.beginPath();g.arc(mx+3,my-64,2.5,0,Math.PI);g.strokePath();
    g.lineStyle(1,sd,.4);g.beginPath();g.arc(mx,my-59,3,.3,Math.PI-.3);g.strokePath();
    g.fillStyle(0x3a2a1a);g.fillCircle(mx,my-75,5);
  }

  // ---- UI ----
  buildUI(){
    this.add.text(W/2,8,'SURYA NAMASKAR A',{fontFamily:'Georgia,serif',fontSize:'20px',color:'#ddeedd',fontStyle:'bold'}).setOrigin(.5,0).setDepth(20);

    // Key boxes
    this.kBoxes={};
    const kx=W/2,ky=GND+30,ks=28,kg=4;

    for(const c of CP){

      this.add.text(p.x,p.y,c.kb,{fontFamily:'monospace',fontSize:'12px',fontStyle:'bold',color:c.col}).setOrigin(.5).setDepth(21);
      this.kBoxes[c.id]=p;
    }

    // Score
    this.scoreTxt=this.add.text(W-14,10,'',{fontFamily:'Arial',fontSize:'14px',color:'#ddeedd',fontStyle:'bold'}).setOrigin(1,0).setDepth(20);

    // Streak
    this.streakTxt=this.add.text(W-14,28,'',{fontFamily:'Arial',fontSize:'11px',color:'#aaccaa'}).setOrigin(1,0).setDepth(20);

    // Strain bar (only for DD hold)
    this.strLbl=this.add.text(16,GND+48,'STRAIN',{fontFamily:'Arial',fontSize:'9px',color:'#cc8888',fontStyle:'bold'}).setDepth(20).setVisible(false);
    this.strBg=this.add.rectangle(16,GND+60,150,8,0x000000,.1).setOrigin(0,0).setDepth(20).setVisible(false);
    this.strFill=this.add.rectangle(16,GND+60,0,8,0xff4444).setOrigin(0,0).setDepth(20).setVisible(false);

    // Breath counter for DD hold
    this.holdBreathTxt=this.add.text(W/2,155,'',{fontFamily:'Georgia,serif',fontSize:'22px',color:'#ddeedd',fontStyle:'bold'}).setOrigin(.5,0).setDepth(20);

    // Retry
    this.retryBtn=this.add.text(W/2,H/2+100,'  Press R to retry  ',{fontFamily:'Arial',fontSize:'16px',fontStyle:'bold',color:'#fff',backgroundColor:'#e67e22',padding:{x:16,y:8}}).setOrigin(.5).setDepth(30).setVisible(false).setInteractive({useHandCursor:true});
    this.retryBtn.on('pointerdown',()=>this.scene.restart());

    this.instrTxt.setText('Press any key to begin Surya Namaskar A');
  }

  // ---- KEYS ----
  bindKeys(){
    for(const c of CP){
      const k=this.input.keyboard.addKey(c.kb);
      k.on('down',()=>{this.held[c.id]=true;});
      k.on('up',()=>{this.held[c.id]=false;});
    }
    this.input.keyboard.on('keydown-SPACE',(e)=>{
      e.preventDefault();
      if(this.st===ST.INTRO) this.beginSequence();
      else if(this.st===ST.FLOW_PEAK) this.completeFlowBreath();
      else if(this.st===ST.HOLD_LOCK) this.startHoldBreath();
      else if(this.st===ST.HOLD_BREATH) this.onHoldBreathPress();
    });
    this.input.keyboard.on('keydown-R',()=>{if(this.st>=ST.COMPLETE)this.scene.restart();});
    this.input.keyboard.on('keydown-M',()=>{mPlaying?mStop():mStart();});
  }

  // ---- BEGIN SEQUENCE ----
  beginSequence(){
    this.vi=0;
    this.updateDots();
    this.advanceToVinyasa(1); // skip samasthiti (index 0), go to Ekam
  }

  advanceToVinyasa(idx){
    if(idx>=SEQ.length){this.onComplete();return;}
    this.vi=idx;
    const v=SEQ[idx];
    this.updateDots();

    // Tween ghost to new target
    for(const c of CP){
      this.tweens.add({targets:this.ghostTgt[c.id],x:v.tgt[c.id].x,y:v.tgt[c.id].y,duration:500,ease:'Sine.easeInOut'});
    }
    this.tweens.add({targets:this,ghostSpa:v.tgt.spa,tgtSpa:v.tgt.spa,duration:500,ease:'Sine.easeInOut'});
    this.ghostA=1;

    // Show count + name
    if(v.count){
      this.countTxt.setText(v.count);this.countTxt.setAlpha(0);
      this.tweens.add({targets:this.countTxt,alpha:1,duration:300});
      sfxCount(idx);
    } else {
      this.countTxt.setAlpha(0);
    }
    this.poseTxt.setText(`${v.sans} — ${v.name}`);this.poseTxt.setAlpha(0);
    this.tweens.add({targets:this.poseTxt,alpha:.8,duration:400});

    // Breath direction
    if(v.breath==='in'){
      this.breathDirTxt.setText('↑ INHALE');this.breathDirTxt.setColor('#88ccff');
    } else if(v.breath==='out'){
      this.breathDirTxt.setText('↓ EXHALE');this.breathDirTxt.setColor('#ffcc88');
    } else {
      this.breathDirTxt.setText('');
    }

    if(v.type==='flow'){
      this.st=ST.FLOW;
      this.breathFill=v.breath==='in'?0:1;
      this.breathDir=v.breath==='in'?1:-1;
      this.breathWindow=false;this.breathHit=false;
      this.instrTxt.setText('Hold keys to shape the pose — press SPACE at breath peak');
    } else if(v.type==='hold'){
      this.st=ST.HOLD_SETUP;
      this.holdBreathN=0;this.strain=0;
      this.breathFill=0;this.breathDir=1;this.breathWindow=false;this.breathHit=false;
      this.strLbl.setVisible(true);this.strBg.setVisible(true);this.strFill.setVisible(true);
      this.instrTxt.setText('Get into Downward Dog — snap all 5 points, then press SPACE');
    } else if(v.type==='end'){
      // Return to standing — auto-complete after short delay
      this.st=ST.FLOW;
      this.breathFill=1;this.breathDir=-1;
      this.breathWindow=false;this.breathHit=false;
    }
  }

  updateDots(){
    for(let i=0;i<this.dots.length;i++){
      const d=this.dots[i];
      if(i<this.vi){d.setFillStyle(0x44ff88,1);d.setRadius(3);}
      else if(i===this.vi){d.setFillStyle(0xff9933,1);d.setRadius(5);d.setStrokeStyle(2,0xff9933,.6);}
      else{d.setFillStyle(0x666666,.4);d.setRadius(3);d.setStrokeStyle(0);}
    }
  }

  // ---- PHYSICS ----
  physics(dt){
    const v=SEQ[this.vi];
    const tgt=v?v.tgt:P_SAMA;
    const isHold=this.st===ST.HOLD_BREATH;
    const breathMul=isHold?1+this.holdBreathN*.25:1;
    const liftSpd=isHold?3:4;
    const friction=0.88;

    // Gravity rest: during flow, pull toward NEXT pose (smooth transitions)
    // During hold, pull toward collapsed
    const nextTgt=(this.st===ST.FLOW||this.st===ST.FLOW_PEAK)&&this.vi+1<SEQ.length?SEQ[this.vi+1].tgt:null;

    for(const c of CP){
      const p=this.p[c.id],vel=this.v[c.id],t=tgt[c.id];
      if(this.held[c.id]&&this.st<ST.COMPLETE){
        const dx=t.x-p.x,dy=t.y-p.y,d=Math.sqrt(dx*dx+dy*dy)||.01;
        const mag=d<25?liftSpd*1.5:liftSpd;
        const ease=Math.min(mag,d*.1);
        vel.x+=(dx/d)*ease*dt*60;vel.y+=(dy/d)*ease*dt*60;
      } else if(this.st<ST.COMPLETE){
        // Gravity: blend between collapsed and next pose target
        const rest=nextTgt?nextTgt[c.id]:COLLAPSED[c.id];
        const grav=(0.5+this.strain*.6)*breathMul;
        const dx=rest.x-p.x,dy=rest.y-p.y,d=Math.sqrt(dx*dx+dy*dy)||.01;
        if(d>1){vel.x+=(dx/d)*grav*dt*25;vel.y+=(dy/d)*grav*dt*25;}
        vel.y+=.015*60*dt*breathMul;
      }
      vel.x*=friction;vel.y*=friction;
      p.x+=vel.x*dt*60;p.y+=vel.y*dt*60;
      if(isNaN(p.x)||isNaN(p.y)){p.x=P_SAMA[c.id].x;p.y=P_SAMA[c.id].y;vel.x=0;vel.y=0;}
      p.y=Math.min(p.y,GND);p.x=Phaser.Math.Clamp(p.x,50,W-50);
    }

    // Interpolate spine angle
    const spaSpeed=4*dt;
    let diff=this.tgtSpa-this.curSpa;
    if(diff>Math.PI)diff-=Math.PI*2;if(diff<-Math.PI)diff+=Math.PI*2;
    this.curSpa+=diff*Math.min(spaSpeed,1);
  }

  alignment(){
    const tgt=SEQ[this.vi].tgt;
    let t=0;for(const c of CP){const cur=this.p[c.id],tp=tgt[c.id];
      t+=Math.max(0,1-Phaser.Math.Distance.Between(cur.x,cur.y,tp.x,tp.y)/80);}return t/CP.length;
  }

  checkSnaps(){
    const tgt=SEQ[this.vi].tgt;const SD=38;let all=true;
    for(const c of CP){
      const cur=this.p[c.id],t=tgt[c.id];
      const d=Phaser.Math.Distance.Between(cur.x,cur.y,t.x,t.y);
      const was=this.snapped[c.id],is=d<SD;
      this.snapped[c.id]=is;
      if(is&&!was){sfxSnap();this.pulse[c.id]=1;this.snapE.setPosition(cur.x,cur.y);this.snapE.explode(6);}
      if(!is)all=false;
    }
    for(const k of Object.keys(this.pulse))if(this.pulse[k]>0)this.pulse[k]=Math.max(0,this.pulse[k]-.03);
    return all;
  }

  // ---- DRAWING ----
  drawGhost(){
    const g=this.gGhost;g.clear();if(this.ghostA<.01)return;
    const s=skel(this.ghostTgt,this.ghostSpa);
    for(const bn of BONES){const ja=s[bn.a],jb=s[bn.b];if(!ja||!jb)continue;
      g.lineStyle(bn.w+2,0x64c8dc,.05*this.ghostA);g.beginPath();g.moveTo(ja.x,ja.y);g.lineTo(jb.x,jb.y);g.strokePath();
      g.lineStyle(bn.w-2,0x64c8dc,.12*this.ghostA);g.beginPath();g.moveTo(ja.x,ja.y);g.lineTo(jb.x,jb.y);g.strokePath();}
    g.fillStyle(0x64c8dc,.08*this.ghostA);g.fillCircle(s.head.x,s.head.y,18);
    // Snap circles
    const tgt=SEQ[this.vi].tgt;
    for(const c of CP){const p=tgt[c.id],sn=this.snapped[c.id];
      g.lineStyle(2,sn?0x44ff88:0x64c8dc,(sn?.4:.25)*this.ghostA);g.strokeCircle(p.x,p.y,sn?14:11);
      if(sn){g.fillStyle(0x44ff88,.08*this.ghostA);g.fillCircle(p.x,p.y,14);}}
  }

  drawBody(){
    const g=this.gBody;g.clear();
    this.sk=skel(this.p,this.curSpa);
    let sf=0xd4956b,ss=0xb07850;
    if(this.st===ST.HOLD_BREATH&&this.strain>.3){const t=Math.floor(this.strain*60);
      sf=Phaser.Display.Color.GetColor(Math.min(255,212+t),Math.max(100,149-t),Math.max(80,107-t));}
    // Aura
    if(this.st===ST.HOLD_BREATH||this.st===ST.FLOW||this.st===ST.FLOW_PEAK){
      const bf=this.breathFill||0;const gl=.02+bf*.05;
      const gc=this.strain>.5?0xff8844:0x88ccff;
      const cx=(this.sk.hip.x+this.sk.chest.x)/2,cy=(this.sk.hip.y+this.sk.chest.y)/2;
      g.fillStyle(gc,gl*.4);g.fillCircle(cx,cy,60+bf*15);
    }
    for(const bn of BONES){const a=this.sk[bn.a],b=this.sk[bn.b];if(!a||!b)continue;
      g.lineStyle(bn.w+3,ss,1);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.strokePath();
      g.lineStyle(bn.w,sf,1);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.strokePath();}
    for(const jp of['chest','shL','shR','hipL','hipR','elbL','elbR','knL','knR']){
      const pt=this.sk[jp];if(!pt)continue;g.fillStyle(sf);g.fillCircle(pt.x,pt.y,jp.includes('elb')||jp.includes('kn')?6:7);}
    for(const ep of['handL','handR','footL','footR']){const pt=this.sk[ep];if(!pt)continue;g.fillStyle(sf);g.fillCircle(pt.x,pt.y,ep[0]==='h'?5:6);g.fillStyle(ss);g.fillCircle(pt.x,pt.y,ep[0]==='h'?3:4);}
    const hd=this.sk.head,nk=this.sk.neck;
    if(hd&&nk){g.fillStyle(ss);g.fillCircle(hd.x,hd.y,18);g.fillStyle(sf);g.fillCircle(hd.x,hd.y,16);
      const fa=Math.atan2(hd.y-nk.y,hd.x-nk.x),px=-Math.sin(fa)*5,py=Math.cos(fa)*5;
      g.fillStyle(ss);g.fillCircle(hd.x+px+Math.cos(fa)*4,hd.y+py+Math.sin(fa)*4,2);
      g.fillCircle(hd.x-px+Math.cos(fa)*4,hd.y-py+Math.sin(fa)*4,2);}
  }

  drawBreathBar(){
    const g=this.gBreath;g.clear();
    if(this.st<ST.FLOW||this.st>ST.HOLD_BREATH)return;
    const cx=W/2,cy=this.st>=ST.HOLD_SETUP?150:150;
    const barW=140,barH=12,barX=cx-barW/2,barY=cy;
    const fill=this.breathFill||0;
    g.fillStyle(0x000000,.08);g.fillRoundedRect(barX-2,barY-2,barW+4,barH+4,4);
    let barCol=this.breathDir>0?0x88bbdd:0xddbb88;
    if(this.breathWindow)barCol=this.breathHit?0x44ff88:0xffcc44;
    g.fillStyle(barCol,.5);g.fillRoundedRect(barX,barY,Math.floor(barW*fill),barH,3);
    g.lineStyle(1,0xaaaaaa,.2);g.strokeRoundedRect(barX,barY,barW,barH,3);
    if(this.breathWindow&&!this.breathHit){
      const pulse=.5+.5*Math.sin(this.time.now*.01);
      g.fillStyle(0xffcc44,.1+.1*pulse);g.fillCircle(cx,cy+barH/2,25+3*pulse);
    }
  }

  drawKeyUI(){
    const g=this.gUI;g.clear();if(this.st>=ST.COMPLETE)return;
    for(const c of CP){
      const kb=this.kBoxes[c.id],h=this.held[c.id],sn=this.snapped[c.id];
      const col=Phaser.Display.Color.HexStringToColor(c.col).color;
      if(h){g.fillStyle(col,.25);g.fillRoundedRect(kb.x-14,kb.y-14,28,28,5);}
      if(sn){g.lineStyle(2,0x44ff88,.7);g.strokeRoundedRect(kb.x-14,kb.y-14,28,28,5);}
      const cp=this.p[c.id],sp=this.pulse[c.id];
      if(sp>0){g.lineStyle(2,0x44ff88,sp*.5);g.strokeCircle(cp.x,cp.y,10+8*sp);}
      if(sn){g.fillStyle(0x44ff88,.3);g.fillCircle(cp.x,cp.y,6);}
      else if(h){g.fillStyle(col,.4);g.fillCircle(cp.x,cp.y,6);}
      else{g.fillStyle(col,.15);g.fillCircle(cp.x,cp.y,4);}
    }
  }

  // ---- UPDATE ----
  update(time,delta){
    try{
      const dt=Math.min(delta/1000,.05);
      if(this.st===ST.INTRO)return;

      this.physics(dt);
      this.drawGhost();this.drawBody();this.drawBreathBar();this.drawKeyUI();

      if(this.st===ST.FLOW) this.tickFlow(dt);
      else if(this.st===ST.FLOW_PEAK) {} // waiting for Space or timeout
      else if(this.st===ST.HOLD_SETUP) this.tickHoldSetup();
      else if(this.st===ST.HOLD_LOCK) this.tickHoldLock();
      else if(this.st===ST.HOLD_BREATH) this.tickHoldBreath(dt);
    }catch(e){console.error('Update:',e);}
  }

  // ---- FLOW VINYASA ----
  tickFlow(dt){
    const speed=.3;
    this.breathFill+=this.breathDir*speed*dt;
    this.breathFill=Phaser.Math.Clamp(this.breathFill,0,1);

    const peak=(this.breathDir>0&&this.breathFill>=.98)||(this.breathDir<0&&this.breathFill<=.02);
    if(peak&&!this.breathWindow){
      this.breathWindow=true;
      this.st=ST.FLOW_PEAK;
      // Auto-advance after window
      if(this._breathTimeout)this._breathTimeout.remove();
      this._breathTimeout=this.time.delayedCall(1200,()=>{
        if(this.st===ST.FLOW_PEAK&&!this.breathHit) this.completeFlowBreath();
        this._breathTimeout=null;
      });
    }
  }

  completeFlowBreath(){
    if(this.st!==ST.FLOW_PEAK)return;
    this.breathHit=true;
    if(this._breathTimeout){this._breathTimeout.remove();this._breathTimeout=null;}

    // Score this vinyasa
    const al=this.alignment();
    const wasInWindow=this.breathWindow;
    const alignScore=Math.floor(al*100);
    const timingScore=wasInWindow?50:20;
    const flowBonus=al>.85?25:0;
    const vScore=alignScore+timingScore+flowBonus;

    // Streak
    if(al>.65){this.streak++;} else {this.streak=0;}
    const mul=1+Math.min(this.streak,10)*.1;
    const finalScore=Math.floor(vScore*mul);
    this.score+=finalScore;

    sfxFlow();
    this.scoreTxt.setText(`Score: ${this.score}`);
    this.streakTxt.setText(this.streak>1?`Streak: ${this.streak}x`:'');

    // Score popup
    const pop=this.add.text(W/2,140,`+${finalScore}`,{fontFamily:'Arial',fontSize:'16px',color:'#44ff88',fontStyle:'bold'}).setOrigin(.5).setDepth(25);
    this.tweens.add({targets:pop,y:110,alpha:0,duration:800,onComplete:()=>pop.destroy()});

    // Breath particles
    const h=this.sk.head;
    if(h){this.breathE.setPosition(h.x,h.y-12);this.breathE.explode(4);}

    // Advance after short pause
    this.time.delayedCall(400,()=>{
      const v=SEQ[this.vi];
      if(v.type==='end'){this.onComplete();return;}
      this.advanceToVinyasa(this.vi+1);
    });
  }

  // ---- HOLD (Downward Dog) ----
  tickHoldSetup(){
    this.checkSnaps();
    const all=Object.values(this.snapped).every(v=>v);
    if(all){this.st=ST.HOLD_LOCK;this.instrTxt.setText('All snapped! Press SPACE to begin the hold');}
    else this.instrTxt.setText('Get into Downward Dog — snap all 5 points');
  }

  tickHoldLock(){
    this.checkSnaps();
    const all=Object.values(this.snapped).every(v=>v);
    if(!all)this.st=ST.HOLD_SETUP;
  }

  startHoldBreath(){
    this.st=ST.HOLD_BREATH;
    this.holdBreathN=0;this.strain=0;
    this.breathFill=0;this.breathDir=1;this.breathWindow=false;this.breathHit=false;
    sfxFlow();
    this.showWisdom('"Hold... breathe deeply. You are exactly where you need to be."');
    this.instrTxt.setText('Press SPACE at breath peak — survive 5 breaths!');
  }

  onHoldBreathPress(){
    if(this.breathWindow&&!this.breathHit){
      this.breathHit=true;
      const al=this.alignment();
      const s=Math.floor(al*100*(1-this.strain));
      this.score+=s;sfxBreath();
      this.strain=Math.max(0,this.strain-.12);
      const h=this.sk.head;if(h){this.breathE.setPosition(h.x,h.y-12);this.breathE.explode(6);}
      this.scoreTxt.setText(`Score: ${this.score}`);
    } else if(!this.breathWindow){
      this.strain=Math.min(1,this.strain+.08);beep(200,.1,.06);
    }
  }

  tickHoldBreath(dt){
    const speed=.35+this.holdBreathN*.03;
    this.breathFill+=this.breathDir*speed*dt;

    if(this.breathDir===1&&this.breathFill>=1){
      this.breathFill=1;this.breathWindow=true;
      if(!this._breathTimeout){
        this._breathTimeout=this.time.delayedCall(900,()=>{
          if(!this.breathHit&&this.st===ST.HOLD_BREATH)this.strain=Math.min(1,this.strain+.15);
          this.breathDir=-1;this.breathWindow=false;this.breathHit=false;
          this._breathTimeout=null;
        });
      }
    } else if(this.breathDir===-1&&this.breathFill<=0){
      this.breathFill=0;this.breathDir=1;this.holdBreathN++;
      if(this.holdBreathN>=SEQ[this.vi].breaths){
        // DD complete — advance
        this.strLbl.setVisible(false);this.strBg.setVisible(false);this.strFill.setVisible(false);
        this.holdBreathTxt.setText('');
        sfxBreath();
        this.score+=200; // hold completion bonus
        this.scoreTxt.setText(`Score: ${this.score}`);
        this.time.delayedCall(300,()=>this.advanceToVinyasa(this.vi+1));
        return;
      }
    }

    if(this.breathHit&&this.breathWindow&&this.breathDir===1){
      if(this._breathTimeout){this._breathTimeout.remove();this._breathTimeout=null;}
      this.breathDir=-1;this.breathWindow=false;
    }

    const al=this.alignment();
    this.strain+=(1-al)*.15*dt;this.strain-=.03*dt*al;
    this.strain=Phaser.Math.Clamp(this.strain,0,1);
    this.strFill.setSize(Math.floor(150*this.strain),8);
    this.strFill.setFillStyle(this.strain>.7?0xff2222:this.strain>.4?0xff8844:0xffaa44);

    if(this.strain>.5&&Math.random()<.05){const h=this.sk.head;if(h){this.sweatE.setPosition(h.x+(Math.random()-.5)*16,h.y);this.sweatE.explode(2);}}
    if(this.strain>.75)this.cameras.main.shake(25,.001*this.strain);
    if(this.strain>=1){this.onFail();return;}

    this.holdBreathTxt.setText(`Breath ${this.holdBreathN+1} / ${SEQ[this.vi].breaths}`);
    this.instrTxt.setText(this.breathWindow&&!this.breathHit?'⬤ Press SPACE!':this.breathDir>0?'↑ Inhale...':'↓ Exhale...');
    this.checkSnaps();
  }

  // ---- COMPLETE ----
  onComplete(){
    this.st=ST.COMPLETE;
    this.score+=500; // completion bonus
    sfxWin();
    this.instrTxt.setText('');this.holdBreathTxt.setText('');this.countTxt.setAlpha(0);this.breathDirTxt.setText('');

    // Grade
    const grades=[{min:3500,g:'S'},{min:2800,g:'A'},{min:2000,g:'B'},{min:1200,g:'C'},{min:600,g:'D'},{min:0,g:'F'}];
    const grade=grades.find(g=>this.score>=g.min).g;

    const nm=this.add.text(W/2,H/2-90,'Namaste!',{fontFamily:'Georgia,serif',fontSize:'52px',color:'#4caf50',fontStyle:'bold',stroke:'#fff',strokeThickness:4}).setOrigin(.5).setDepth(30).setAlpha(0);
    this.tweens.add({targets:nm,alpha:1,scaleX:[.3,1],scaleY:[.3,1],duration:500,ease:'Back.easeOut'});

    this.add.text(W/2,H/2-35,`Surya Namaskar A Complete`,{fontFamily:'Georgia,serif',fontSize:'18px',color:'#ddeedd'}).setOrigin(.5).setDepth(30);
    this.scoreTxt.setText(`Final: ${this.score}`);
    this.add.text(W/2,H/2-5,`Score: ${this.score}   Grade: ${grade}`,{fontFamily:'Arial',fontSize:'16px',color:'#eeffee',fontStyle:'bold'}).setOrigin(.5).setDepth(30);
    this.add.text(W/2,H/2+25,`Flow streak: ${this.streak}   Completion bonus: +500`,{fontFamily:'Arial',fontSize:'13px',color:'#aaccaa'}).setOrigin(.5).setDepth(30);

    this.showWisdom(Q_WIN[Math.floor(Math.random()*Q_WIN.length)]);

    for(let i=0;i<6;i++){const em=this.add.particles(W/2,-10,`cf${i}`,{x:{min:-W/2,max:W/2},speed:{min:80,max:250},angle:{min:70,max:110},rotate:{min:0,max:360},scale:{start:1,end:.4},lifespan:2800,gravityY:120,quantity:2,frequency:60,maxParticles:25}).setDepth(25);
      this.time.delayedCall(2800,()=>em.destroy());}

    this.time.delayedCall(1500,()=>this.retryBtn.setVisible(true));
  }

  // ---- FAIL ----
  onFail(){
    this.st=ST.FAIL;sfxFail();
    for(const k of Object.keys(this.held))this.held[k]=false;
    for(const c of CP){this.v[c.id].x=(Math.random()-.5)*3;this.v[c.id].y=-4-Math.random()*3;}
    this.showWisdom(Q_FAIL[Math.floor(Math.random()*Q_FAIL.length)]);
    this.cameras.main.shake(400,.008);
    if(this._breathTimeout){this._breathTimeout.remove();this._breathTimeout=null;}
    this.strLbl.setVisible(false);this.strBg.setVisible(false);this.strFill.setVisible(false);
    this.add.text(W/2,H/2-60,'Collapsed!',{fontFamily:'Georgia,serif',fontSize:'42px',color:'#e74c3c',fontStyle:'bold',stroke:'#fff',strokeThickness:4}).setOrigin(.5).setDepth(30);
    this.instrTxt.setText('');this.holdBreathTxt.setText('');
    this.time.delayedCall(1200,()=>this.retryBtn.setVisible(true));
  }
}

new Phaser.Game({type:Phaser.AUTO,width:W,height:H,backgroundColor:'#1a2a1a',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},scene:[Game]});
</script>
